[versions]
shadow = "9.1.0"
buildconfig = "5.7.1"
jooq_gen = "7.2"

lombok = "1.18.42"
jetbrains_annotations = "26.0.2"

spock_core = "2.4-groovy-4.0"
mockito_core = "4.11.0"

slf4j = "2.0.17"
log4j = "2.25.3"

joor = "0.9.15"

jackson = "2.21.0"
night_config = "3.8.3"

validation = "3.1.1"
validator = "3.0.0"

jooq = "3.16.23"
hikaricp = "7.0.2"

h2 = "2.4.240"
sqlite = "3.51.1.0"
mysql = "9.6.0"
mariadb = "3.5.7"
postgresql = "42.2.23"
embedded_mariadb = "3.3.1"

lettuce = "7.4.0.RELEASE"
embedded_redis = "0.7.3"

mongodb = "5.6.3"
reactor = "3.8.3"
embedded_mongodb = "4.24.0"

[libraries]
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
jetbrains_annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains_annotations" }

spock_core = { module = "org.spockframework:spock-core", version.ref = "spock_core" }
mockito_core = { module = "org.mockito:mockito-core", version.ref = "mockito_core" }

slf4j = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
log4j_api = { module = "org.apache.logging.log4j:log4j-api", version.ref = "log4j" }
log4j_core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "log4j" }
log4j_slf4j = { module = "org.apache.logging.log4j:log4j-slf4j2-impl", version.ref = "log4j" }

joor = { module = "org.jooq:joor", version.ref = "joor" }

jackson_json = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson_yaml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml", version.ref = "jackson" }
jackson_toml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-toml", version.ref = "jackson" }
jackson_xml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-xml", version.ref = "jackson" }
jackson_properties = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-properties", version.ref = "jackson" }

night_config_toml = { module = "com.electronwill.night-config:toml", version.ref = "night_config" }

validation = { module = "jakarta.validation:jakarta.validation-api", version.ref = "validation" }
validator = { module = "org.apache.bval:bval-jsr", version.ref = "validator" }

jooq = { module = "org.jooq:jooq", version.ref = "jooq" }
hikaricp = { module = "com.zaxxer:HikariCP", version.ref = "hikaricp" }

h2 = { module = "com.h2database:h2", version.ref = "h2" }
sqlite = { module = "org.xerial:sqlite-jdbc", version.ref = "sqlite" }
mysql = { module = "com.mysql:mysql-connector-j", version.ref = "mysql" }
mariadb = { module = "org.mariadb.jdbc:mariadb-java-client", version.ref = "mariadb" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
embedded_mariadb = { module = "ch.vorburger.mariaDB4j:mariaDB4j", version.ref = "embedded_mariadb" }

lettuce = { module = "io.lettuce:lettuce-core", version.ref = "lettuce" }
embedded_redis = { module = "it.ozimov:embedded-redis", version.ref = "embedded_redis" }

mongodb-driver-platform = { module = "org.mongodb:mongodb-driver-bom", version.ref = "mongodb" }
mongodb-driver-async = { module = "org.mongodb:mongodb-driver-reactivestreams", version.ref = "mongodb" }
reactor = { module = "io.projectreactor:reactor-core", version.ref = "reactor" }
embedded_mongodb = { module = "de.flapdoodle.embed:de.flapdoodle.embed.mongo", version.ref = "embedded_mongodb" }

[bundles]
annotations = ["lombok", "jetbrains_annotations"]

test_framework = ["spock_core", "mockito_core"]

log4j = ["log4j_api", "log4j_core", "log4j_slf4j"]

toml = ["jackson_toml", "night_config_toml"]

validation = ["validation", "validator"]

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
buildconfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildconfig" }
jooq = { id = "nu.studer.jooq", version.ref = "jooq_gen" }
