[versions]
shadow = "9.1.0"
buildconfig = "5.7.1"
jooq_gen = "7.2"

lombok = "1.18.42"
jetbrains_annotations = "26.0.2"

spock_core = "2.4-groovy-4.0"
byte_buddy = "1.18.2"
mockito_core = "4.11.0"

log4j = "2.25.3"

jackson = "2.21.0"

jooq = "3.16.23"
hikaricp = "7.0.2"

h2 = "2.4.240"
sqlite = "3.51.1.0"

[libraries]
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
jetbrains_annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains_annotations" }

spock_core = { module = "org.spockframework:spock-core", version.ref = "spock_core" }
byte_buddy = { module = "net.bytebuddy:byte-buddy", version.ref = "byte_buddy" }
mockito_core = { module = "org.mockito:mockito-core", version.ref = "mockito_core" }

log4j_api = { module = "org.apache.logging.log4j:log4j-api", version.ref = "log4j" }
log4j_core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "log4j" }
log4j_slf4j = { module = "org.apache.logging.log4j:log4j-slf4j2-impl", version.ref = "log4j" }

jooq = { module = "org.jooq:jooq", version.ref = "jooq" }
hikaricp = { module = "com.zaxxer:HikariCP", version.ref = "hikaricp" }

jackson_json = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }

h2 = { module = "com.h2database:h2", version.ref = "h2" }
sqlite = { module = "org.xerial:sqlite-jdbc", version.ref = "sqlite" }

[bundles]
annotations = ["lombok", "jetbrains_annotations"]

test_framework = ["spock_core", "byte_buddy", "mockito_core"]

log4j = ["log4j_api", "log4j_core", "log4j_slf4j"]

[plugins]
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
buildconfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildconfig" }
jooq = { id = "nu.studer.jooq", version.ref = "jooq_gen" }
