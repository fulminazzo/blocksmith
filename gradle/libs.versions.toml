[versions]
# PLUGINS
buildconfig = "6.0.9"
shadow = "9.1.0"

# ANNOTATIONS
lombok = "1.18.44"
jetbrains_annotations = "26.1.0"

# LOGGING
slf4j = "2.0.17"
log4j = "2.25.4"

# TESTING
spock_core = "2.4-groovy-5.0"
mockito = "5.23.0"

# DATA FORMATS
jackson = "2.21.2"
night_config = "3.8.4"

# ADVENTURE
adventure_text = "4.26.1"
adventure_text_platform = "4.4.1"

# MINECRAFT
spigot = "1.16.5-R0.1-SNAPSHOT"
folia = "1.20.1-R0.1-SNAPSHOT"
bungeecord = "1.16-R0.2"
velocity = "3.0.0-SNAPSHOT"
brigadier = "1.3.10"


mockbukkit16 = "1.5.2"
mockbukkit = "3.43.0"

# PROJECT
java_parser = "3.28.0"

[libraries]
# ANNOTATIONS
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }
jetbrains_annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains_annotations" }

# LOGGING
slf4j = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
log4j_api = { module = "org.apache.logging.log4j:log4j-api", version.ref = "log4j" }
log4j_core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "log4j" }
log4j_slf4j = { module = "org.apache.logging.log4j:log4j-slf4j2-impl", version.ref = "log4j" }
slf4j_jdk = { module = "org.slf4j:slf4j-jdk14", version.ref = "slf4j" }

# TESTING
junit_platform = { module = "org.junit.platform:junit-platform-launcher" }

spock_core = { module = "org.spockframework:spock-core", version.ref = "spock_core" }
mockito = { module = "org.mockito:mockito-core", version.ref = "mockito" }

# DATA FORMATS
jackson_json = { module = "com.fasterxml.jackson.core:jackson-databind", version.ref = "jackson" }
jackson_yaml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml", version.ref = "jackson" }
jackson_toml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-toml", version.ref = "jackson" }
jackson_xml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-xml", version.ref = "jackson" }
jackson_properties = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-properties", version.ref = "jackson" }

night_config_toml = { module = "com.electronwill.night-config:toml", version.ref = "night_config" }

# ADVENTURE
minimessage = { module = "net.kyori:adventure-text-minimessage", version.ref = "adventure_text" }
adventure_serializer_legacy = { module = "net.kyori:adventure-text-serializer-legacy", version.ref = "adventure_text" }
adventure_platform_bukkit = { module = "net.kyori:adventure-platform-bukkit", version.ref = "adventure_text_platform" }
adventure_platform_bungeecord = { module = "net.kyori:adventure-platform-bungeecord", version.ref = "adventure_text_platform" }

# MINECRAFT
spigot = { module = "org.spigotmc:spigot-api", version.ref = "spigot" }
folia = { module = "dev.folia:folia-api", version.ref = "folia" }
bungeecord = { module = "net.md-5:bungeecord-api", version.ref = "bungeecord" }
velocity = { module = "com.velocitypowered:velocity-api", version.ref = "velocity" }
brigadier = { module = "com.mojang:brigadier", version.ref = "brigadier" }


mockbukkit16 = { module = "com.github.seeseemelk:MockBukkit-v1.16", version.ref = "mockbukkit16" }
mockbukkit = { module = "com.github.seeseemelk:MockBukkit-v1.20", version.ref = "mockbukkit" }

# PROJECT
java_parser = { module = "com.github.javaparser:javaparser-symbol-solver-core", version.ref = "java_parser" }

[bundles]
# ANNOTATIONS
annotations = ["lombok", "jetbrains_annotations"]

# LOGGING
log4j = ["log4j_api", "log4j_core", "log4j_slf4j"]

# TESTING
test_framework = ["spock_core", "mockito"]

# DATA FORMATS
toml = ["jackson_toml", "night_config_toml"]

# ADVENTURE
adventure_text = ["minimessage", "adventure_serializer_legacy"]

[plugins]
buildconfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildconfig" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
