prefix: '<green><bold>Block<red><bold>smith <reset><dark_gray>» '
greeting:
  - '%prefix%<yellow>Ciao, <gold>%name%<yellow>!'
  - '%prefix%<yellow>Come stai oggi?'
usage: '%prefix%<yellow>Utilizzo: <gray>%usage%'

success:
