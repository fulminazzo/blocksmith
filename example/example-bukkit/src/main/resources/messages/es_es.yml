prefix: '<green><bold>Block<red><bold>smith <reset><dark_gray>» '
greeting:
  - '%prefix%<yellow>Hola, <gold>%name%<yellow>!'
  - '%prefix%<yellow>¿Cómo estás hoy?'
usage: '%prefix%<yellow>Uso: <gray>%usage%'

general:
  time-format: '[<dark_red>%years% {año|años}<dark_gray>, ][<red>%months% {mes|meses}<dark_gray>, ][<gold>%weeks% {semana|semanas}<dark_gray>, ][<yellow>%days% {día|días}<dark_gray>, ][<green>%hours% {hora|horas}<dark_gray>, ][<aqua>%minute% {minuto|minutos}<dark_gray>, ](<blue>%seconds% {segundo|segundos})'

success:
  set-locale: '%prefix%<yellow>Se ha actualizado el idioma a <white>%locale% correctamente'
  last-death: '%prefix%<yellow>Tiempo desde la última muerte: %time%'

error:
  not-enough-arguments: '%prefix%<red>¡No has especificado suficientes argumentos!'
  console-cannot-execute: '%prefix%<red>La consola no puede ejecutar este comando.'
